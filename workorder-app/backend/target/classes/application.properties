# Port defaults to 8080. Override with the WORKORDER_PORT environment
# variable, or just edit this file directly.
server.port=${WORKORDER_PORT:8080}

# Which repository to use: "memory" (default, no setup needed) or "jdbc"
# (real SQL Server -- also requires the spring.datasource.* properties
# below to be set).
workorder.storage=memory

# Uncomment these and set workorder.storage=jdbc above to use a real
# SQL Server database instead. Run sql/schema.sql against it first.
#spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WorkOrders;encrypt=true;trustServerCertificate=true
